version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: estateX_db
    environment:
      POSTGRES_DB: estateX
      POSTGRES_USER: estateX
      POSTGRES_PASSWORD: estateX_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estateX"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: estateX_backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/estateX
      DATABASE_USER: estateX
      DATABASE_PASSWORD: estateX_secret
      FILES_BASE_URL: http://localhost:8080/files
      FRONTEND_URL: http://localhost:80
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: estateX_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
